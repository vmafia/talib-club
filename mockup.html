<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ฐานข้อมูลนักวิชาการอิสลาม</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;
  --bg2:#17171a;
  --bg3:#1e1e22;
  --border:#2a2a30;
  --text:#e8e8ec;
  --text2:#9090a0;
  --text3:#55555f;
  --green:#3ecf8e;
  --green-dim:#1a5c40;
  --blue:#4da6ff;
  --blue-dim:#1a3d66;
  --purple:#a78bfa;
  --purple-dim:#3b2f6e;
  --amber:#f59e0b;
  --amber-dim:#5c3a08;
  --red:#f87171;
  --red-dim:#5c1e1e;
  --teal:#2dd4bf;
  --teal-dim:#0d4a42;
  --rose:#fb7185;
  --rose-dim:#5c1e2a;
  --gray-dim:#2a2a30;
}
body{
  font-family:'IBM Plex Sans Thai',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}
header{
  padding:2rem 2rem 1.5rem;
  border-bottom:1px solid var(--border);
  display:flex;
  flex-wrap:wrap;
  gap:1rem;
  align-items:flex-end;
  justify-content:space-between;
}
.header-title h1{
  font-size:1.4rem;
  font-weight:600;
  letter-spacing:-0.02em;
  color:var(--text);
}
.header-title p{
  font-size:0.78rem;
  color:var(--text3);
  font-family:'IBM Plex Mono',monospace;
  margin-top:4px;
}
.controls{
  padding:1rem 2rem;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:100;
}
.controls input,.controls select{
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:13px;
  padding:6px 12px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  outline:none;
}
.controls input{
  flex:1;
  min-width:200px;
}
.controls input:focus,.controls select:focus{
  border-color:#3a3a45;
}
.stats-bar{
  padding:8px 2rem;
  font-size:12px;
  color:var(--text3);
  font-family:'IBM Plex Mono',monospace;
  border-bottom:1px solid var(--border);
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}
.legend{
  padding:10px 2rem;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  border-bottom:1px solid var(--border);
  align-items:center;
}
.leg-label{font-size:11px;color:var(--text3);margin-right:4px}
.badge{
  display:inline-block;
  font-size:11px;
  padding:2px 9px;
  border-radius:20px;
  font-weight:500;
  white-space:nowrap;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:1px;
  background:var(--border);
  border-top:1px solid var(--border);
}
.card{
  background:var(--bg);
  padding:14px 16px;
  transition:background 0.15s;
}
.card:hover{background:var(--bg2)}
.card-name{
  font-size:13.5px;
  font-weight:500;
  color:var(--text);
  margin-bottom:2px;
  line-height:1.4;
}
.card-latin{
  font-size:11px;
  color:var(--text3);
  font-family:'IBM Plex Mono',monospace;
  margin-bottom:4px;
}
.card-dates{
  font-size:11px;
  color:var(--text3);
  margin-bottom:8px;
}
.badges{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.card-desc{font-size:11.5px;color:var(--text2);line-height:1.55}
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:4rem;
  color:var(--text3);
  font-size:14px;
}
/* aqeedah */
.baq-salafi{background:var(--green-dim);color:var(--green)}
.baq-ashari{background:var(--blue-dim);color:var(--blue)}
.baq-maturidi{background:var(--purple-dim);color:var(--purple)}
.baq-unknown{background:var(--gray-dim);color:var(--text3)}
/* manhaj */
.bmh-salafi{background:#0d3d2a;color:#3ecf8e}
.bmh-sufi{background:#2e1e5c;color:#c4b5fd}
.bmh-deobandi{background:#3d2000;color:#fbbf24}
.bmh-bareilwi{background:#3d0020;color:#fb7185}
.bmh-tabligh{background:#002040;color:#7dd3fc}
.bmh-ikhwan{background:#1a3d00;color:#86efac}
.bmh-classic{background:#1a2040;color:#93c5fd}
.bmh-unknown{background:var(--gray-dim);color:var(--text3)}
/* madhab */
.bmz-hanbali{background:#3d1000;color:#fb923c}
.bmz-shafii{background:#3d0030;color:#f9a8d4}
.bmz-maliki{background:#0d3000;color:#6ee7b7}
.bmz-hanafi{background:#302000;color:#fde68a}
.bmz-zahiri{background:#300020;color:#e879f9}
.bmz-unknown{background:var(--gray-dim);color:var(--text3)}
select option{background:#1e1e22}
</style>
</head>
<body>
<header>
  <div class="header-title">
    <h1>ฐานข้อมูลนักวิชาการอิสลาม</h1>
    <p>Emaanlibrary.com — อะกีดะฮฺ · มันฮัจญ์ · มัซฮับ</p>
  </div>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="ค้นหาชื่อ (ไทย/English)...">
  <select id="f-aq">
    <option value="">อะกีดะฮฺทั้งหมด</option>
    <option value="สะลัฟ">สะลัฟ / อะฮฺลุสสุนนะฮฺ</option>
    <option value="อะชะอะรี">อะชะอะรี</option>
    <option value="มาตุรีดี">มาตุรีดี</option>
    <option value="ไม่ระบุ">ไม่ระบุ</option>
  </select>
  <select id="f-mh">
    <option value="">มันฮัจญ์ทั้งหมด</option>
    <option value="สะลัฟี">สะลัฟี</option>
    <option value="ศูฟี">ศูฟี / ตะเซาวุฟ</option>
    <option value="เดโอบันดี">เดโอบันดี</option>
    <option value="บะเรลวี">บะเรลวี</option>
    <option value="ตับลีฆ">ตับลีฆ</option>
    <option value="อิควาน">อิควาน</option>
    <option value="กลาสสิก">กลาสสิก / อะชะอะรี</option>
    <option value="ไม่ระบุ">ไม่ระบุ</option>
  </select>
  <select id="f-mz">
    <option value="">มัซฮับทั้งหมด</option>
    <option value="หัมบะลี">หัมบะลี</option>
    <option value="ชาฟิอี">ชาฟิอี</option>
    <option value="มาลิกี">มาลิกี</option>
    <option value="หะนะฟี">หะนะฟี</option>
    <option value="ซอฮิรี">ซอฮิรี</option>
    <option value="ไม่ระบุ">ไม่ระบุ</option>
  </select>
</div>
<div class="stats-bar">
  <span id="stats-count"></span>
  <span id="stats-aq"></span>
</div>
<div class="legend">
  <span class="leg-label">อะกีดะฮฺ</span>
  <span class="badge baq-salafi">สะลัฟ</span>
  <span class="badge baq-ashari">อะชะอะรี</span>
  <span class="badge baq-maturidi">มาตุรีดี</span>
  <span class="badge baq-unknown">ไม่ระบุ</span>
  <span style="margin:0 8px;color:var(--border)">|</span>
  <span class="leg-label">มันฮัจญ์</span>
  <span class="badge bmh-salafi">สะลัฟี</span>
  <span class="badge bmh-sufi">ศูฟี</span>
  <span class="badge bmh-deobandi">เดโอบันดี</span>
  <span class="badge bmh-tabligh">ตับลีฆ</span>
  <span class="badge bmh-ikhwan">อิควาน</span>
  <span class="badge bmh-classic">กลาสสิก</span>
  <span class="badge bmh-unknown">ไม่ระบุ</span>
  <span style="margin:0 8px;color:var(--border)">|</span>
  <span class="leg-label">มัซฮับ</span>
  <span class="badge bmz-hanbali">หัมบะลี</span>
  <span class="badge bmz-shafii">ชาฟิอี</span>
  <span class="badge bmz-maliki">มาลิกี</span>
  <span class="badge bmz-hanafi">หะนะฟี</span>
  <span class="badge bmz-zahiri">ซอฮิรี</span>
</div>
<div class="grid" id="grid"></div>

<script>

{n:"มาร์ติน ลิงส์",e:"Martin Lings",ah:"1327–1426H",ce:"1909–2005",aq:"อะชะอะรี",mh:"ศูฟี",mz:"มาลิกี",d:"นักวิชาการชาวอังกฤษผู้เข้ารับอิสลาม นักศูฟีชาซิลียะฮฺ"},
{n:"ดร. มอริส บูกัยล์",e:"Dr Maurice Bucaielle",ah:"ไม่ระบุ",ce:"1920–1998",aq:"ไม่ระบุ",mh:"ไม่ระบุ",mz:"ไม่ระบุ",d:"แพทย์ชาวฝรั่งเศส เขียน Bible Quran and Science"},
];

let fil=[...S];
function cls(v,map){for(const[k,c] of Object.entries(map))if(v&&v.includes(k))return c;return map['']||''}
const AQ_C={'สะลัฟ':'baq-salafi','อะชะอะรี':'baq-ashari','มาตุรีดี':'baq-maturidi','':'baq-unknown'};
const MH_C={'สะลัฟี':'bmh-salafi','ศูฟี':'bmh-sufi','เดโอบันดี':'bmh-deobandi','บะเรลวี':'bmh-bareilwi','ตับลีฆ':'bmh-tabligh','อิควาน':'bmh-ikhwan','กลาสสิก':'bmh-classic','':'bmh-unknown'};
const MZ_C={'หัมบะลี':'bmz-hanbali','ชาฟิอี':'bmz-shafii','มาลิกี':'bmz-maliki','หะนะฟี':'bmz-hanafi','ซอฮิรี':'bmz-zahiri','':'bmz-unknown'};
function aqc(v){return AQ_C[v]||'baq-unknown'}
function mhc(v){for(const k of Object.keys(MH_C))if(v&&v.includes(k))return MH_C[k];return 'bmh-unknown'}
function mzc(v){return MZ_C[v]||'bmz-unknown'}

function render(){
  const grid=document.getElementById('grid');
  const cnt=document.getElementById('stats-count');
  cnt.textContent=`แสดง ${fil.length} จาก ${S.length} รายชื่อ`;
  // count breakdown
  const aqMap={};
  fil.forEach(s=>{aqMap[s.aq]=(aqMap[s.aq]||0)+1});
  document.getElementById('stats-aq').textContent=
    Object.entries(aqMap).map(([k,v])=>`${k}: ${v}`).join(' · ');
  if(!fil.length){grid.innerHTML='<div class="empty">ไม่พบรายชื่อที่ตรงกับเงื่อนไข</div>';return}
  grid.innerHTML=fil.map(s=>`<div class="card">
    <div class="card-name">${s.n}</div>
    <div class="card-latin">${s.e}</div>
    <div class="card-dates">${s.ah}${s.ce&&s.ce!==s.ah?' | '+s.ce:''}</div>
    <div class="badges">
      <span class="badge ${aqc(s.aq)}">${s.aq}</span>
      <span class="badge ${mhc(s.mh)}">${s.mh}</span>
      <span class="badge ${mzc(s.mz)}">${s.mz}</span>
    </div>
    <div class="card-desc">${s.d}</div>
  </div>`).join('')
}
function doFilter(){
  const q=document.getElementById('search').value.toLowerCase();
  const aq=document.getElementById('f-aq').value;
  const mh=document.getElementById('f-mh').value;
  const mz=document.getElementById('f-mz').value;
  fil=S.filter(s=>{
    const qok=!q||s.n.toLowerCase().includes(q)||s.e.toLowerCase().includes(q);
    const aqok=!aq||s.aq===aq;
    const mhok=!mh||s.mh.includes(mh);
    const mzok=!mz||s.mz===mz;
    return qok&&aqok&&mhok&&mzok;
  });
  render();
}
document.getElementById('search').addEventListener('input',doFilter);
document.getElementById('f-aq').addEventListener('change',doFilter);
document.getElementById('f-mh').addEventListener('change',doFilter);
document.getElementById('f-mz').addEventListener('change',doFilter);
render();
</script>
